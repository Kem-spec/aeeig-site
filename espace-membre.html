<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mon espace — AEEIG</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" href="assets/favicon-256.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/favicon-256.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="tricolor" aria-hidden="true"></div>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="index.html">
      <img src="assets/logo-full.png" alt="AEEIG — Association des Étudiants Ivoiriens en Guinée">
      <span class="brand-sub">Étudiants ivoiriens en Guinée</span>
    </a>
    <nav class="main-nav" aria-label="Navigation principale">
      <a href="index.html">Accueil</a>
      <a href="actualites.html">Actualités</a>
      <a href="bibliotheque.html">Bibliothèque</a>
      <a href="a-propos.html">À propos</a>
    </nav>
    <div class="nav-cta">
      <button class="btn btn-outline btn-sm" onclick="Auth.signOut()">Se déconnecter</button>
      <button class="burger" aria-label="Ouvrir le menu" aria-expanded="false">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="section">
  <div class="container" id="member-root"></div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom" style="border-top:none; padding-top:0;">
      <span>© 2026 AEEIG — Tous droits réservés</span>
      <a href="index.html">Retour à l'accueil</a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
(async () => {
  const root = document.getElementById("member-root");
  const me = await Auth.me();

  if (!me) { window.location.href = "connexion.html"; return; }

  const prenom = (me.full_name || me.email || "").split(" ")[0];
  const adminLink = me.is_admin ? `<a href="admin.html">Administration ↗</a>` : "";

  if (me.role === "abonne") {
    /* ============ Vue ABONNÉ non-membre ============ */
    const { data: subs } = await SB.from("subscriptions").select("*").eq("user_id", me.id).order("created_at", { ascending: false }).limit(1);
    const sub = subs && subs[0];
    root.innerHTML = `
      <div style="max-width:720px; margin:0 auto;">
        <span class="kicker">Espace abonné</span>
        <h1 style="font-size:2rem;">Bienvenue, ${escapeHtml(me.full_name || me.email)}</h1>
        ${me.is_admin ? `<p><a class="btn btn-outline btn-sm" href="admin.html">Administration ↗</a></p>` : ""}
        <div class="panel-card">
          <h3>Mon abonnement</h3>
          ${sub ? `<p><span class="badge ${sub.statut === "actif" ? "badge-green" : "badge-red"}">${sub.statut}</span> &nbsp; Valable jusqu'au <strong>${formatDate(sub.fin)}</strong>.</p>
          ${sub.paiement_ref ? `<p style="font-size:.9rem; color:var(--ink-soft); margin:0 0 8px;">Paiement confirmé — référence <span class="key-code">${escapeHtml(sub.paiement_ref)}</span>${sub.montant ? ` · ${sub.montant.toLocaleString("fr-FR")} GNF` : ""}.</p>` : ""}` : `<p>Aucun abonnement actif.</p>`}
          <p style="color:var(--ink-soft); font-size:.92rem;">Un rappel vous sera envoyé par e-mail à l'approche de l'échéance.</p>
        </div>
        <div class="profiles">
          <a class="profile-card profile-guest" href="bibliotheque.html" style="text-decoration:none; color:inherit;">
            <h3>Bibliothèque en ligne</h3>
            <p style="color:var(--ink-soft);">Consultez les mémoires, thèses, cours et guides depuis la visionneuse.</p>
            <span class="news-link">Accéder →</span>
          </a>
          <a class="profile-card profile-member" href="actualites.html" style="text-decoration:none; color:inherit;">
            <h3>Actualités AEEIG</h3>
            <p style="color:var(--ink-soft);">Suivez la vie de l'association et ses annonces officielles.</p>
            <span class="news-link">Accéder →</span>
          </a>
        </div>
      </div>`;
    return;
  }

  if (me.role !== "membre" && !me.is_admin) {
    /* Compte créé mais adhésion non finalisée */
    root.innerHTML = `
      <div class="form-card" style="text-align:center;">
        <h2>Adhésion à finaliser</h2>
        <p style="color:var(--ink-soft);">Votre compte est créé mais votre adhésion n'est pas encore validée.
        Saisissez votre clé d'adhésion pour accéder à votre espace membre.</p>
        <a class="btn btn-primary" href="connexion.html#inscription">Saisir ma clé d'adhésion</a>
        <button class="btn btn-ghost" onclick="Auth.signOut()">Se déconnecter</button>
      </div>`;
    return;
  }

  /* ============ Vue MEMBRE (étudiant) ============ */
  const univSel = me.universite || "";
  const facSel = me.faculte || "";
  const univOther = (univSel && !UNIVERSITES.includes(univSel)) ? univSel : "";
  const facOther = (facSel && !FACULTES.includes(facSel)) ? facSel : "";

  root.innerHTML = `
    <div class="dash-layout">
      <aside class="dash-side">
        <div class="side-user">
          <div class="avatar">${initials(me.full_name || me.email)}</div>
          <div>
            <strong>${escapeHtml(me.full_name || me.email)}</strong>
            <span>Membre AEEIG · 2026-2027</span>
          </div>
        </div>
        <nav class="dash-nav" aria-label="Navigation de l'espace membre">
          <button class="active" data-panel="apercu">Aperçu</button>
          <button data-panel="academique">Suivi académique</button>
          <button data-panel="depots">Mes dépôts</button>
          <button data-panel="profil">Mon profil</button>
          <a href="bibliotheque.html">Bibliothèque ↗</a>
          ${adminLink}
        </nav>
      </aside>

      <div>
        <section class="dash-panel active" id="panel-apercu">
          <h2 style="margin-bottom:24px;">Bonjour, ${escapeHtml(prenom)} 👋</h2>
          <div class="stat-grid">
            <div class="stat-card stat-orange"><div class="stat-num">2026-27</div><div class="stat-label">Année académique</div></div>
            <div class="stat-card stat-green"><div class="stat-num">Actif</div><div class="stat-label">Statut de la carte</div></div>
            <div class="stat-card stat-orange"><div class="stat-num">0</div><div class="stat-label">Bulletins déposés</div></div>
            <div class="stat-card stat-green"><div class="stat-num">0</div><div class="stat-label">Mémoire en ligne</div></div>
          </div>
          <div class="panel-card">
            <h3>Dernières actualités</h3>
            <div id="member-news" style="display:flex; flex-direction:column; gap:12px;"></div>
          </div>
        </section>

        <section class="dash-panel" id="panel-academique">
          <h2 style="margin-bottom:24px;">Suivi académique</h2>
          <div class="panel-card">
            <h3>Informations en cours</h3>
            <div class="table-wrap"><table class="data">
              <tr><th>Université</th><td>${escapeHtml(me.universite || "—")}</td></tr>
              <tr><th>Faculté</th><td>${escapeHtml(me.faculte || "À renseigner dans « Mon profil »")}</td></tr>
              <tr><th>Année académique</th><td>2026-2027</td></tr>
            </table></div>
          </div>
          <div class="panel-card">
            <h3>Bulletins de notes</h3>
            <p style="color:var(--ink-soft);">Aucun bulletin déposé pour le moment.</p>
            <button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="toast('Le dépôt de bulletin PDF sera activé prochainement.')">+ Déposer un bulletin</button>
          </div>
        </section>

        <section class="dash-panel" id="panel-depots">
          <h2 style="margin-bottom:24px;">Mes dépôts (thèse / mémoire)</h2>
          <div class="panel-card">
            <p style="color:var(--ink-soft);">Déposez votre thèse ou mémoire : après validation par l'administration,
            il sera publié dans la bibliothèque en ligne et consultable par la communauté.</p>
            <button class="btn btn-primary btn-sm" style="margin-top:8px;" onclick="toast('Le dépôt de document PDF sera activé prochainement.')">+ Déposer un document</button>
          </div>
        </section>

        <section class="dash-panel" id="panel-profil">
          <h2 style="margin-bottom:24px;">Mon profil</h2>
          <div class="panel-card">
            <div id="profile-alert"></div>
            <form id="profile-form" novalidate>
              <div class="field">
                <label for="p-nom">Nom et prénoms</label>
                <input type="text" id="p-nom" value="${escapeHtml(me.full_name || "")}">
              </div>
              <div class="field">
                <label for="p-email">Adresse e-mail</label>
                <input type="email" id="p-email" value="${escapeHtml(me.email || "")}" disabled>
                <span class="hint">L'e-mail de connexion ne peut pas être modifié ici.</span>
              </div>
              <div class="field">
                <label for="p-univ">Université</label>
                <select id="p-univ" data-other="p-univ-other">${optionList(UNIVERSITES, univSel)}</select>
              </div>
              <div class="field" id="p-univ-other" ${univOther ? "" : "hidden"}>
                <label for="p-univ-other-input">Précisez votre université</label>
                <input type="text" id="p-univ-other-input" value="${escapeHtml(univOther)}">
              </div>
              <div class="field">
                <label for="p-fac">Faculté</label>
                <select id="p-fac" data-other="p-fac-other">${optionList(FACULTES, facSel)}</select>
              </div>
              <div class="field" id="p-fac-other" ${facOther ? "" : "hidden"}>
                <label for="p-fac-other-input">Précisez votre faculté</label>
                <input type="text" id="p-fac-other-input" value="${escapeHtml(facOther)}">
              </div>
              ${me.adhesion_key ? `<div class="field">
                <label>Clé d'adhésion utilisée</label><br>
                <span class="key-code">${escapeHtml(me.adhesion_key)}</span>
              </div>` : ""}
              <button type="submit" class="btn btn-green">Enregistrer les modifications</button>
            </form>
          </div>
        </section>
      </div>
    </div>`;

  // Menus déroulants « Autre » (université / faculté)
  wireOtherSelects();

  // Navigation interne (onglets)
  document.querySelectorAll(".dash-nav button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".dash-nav button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".dash-panel").forEach(p => p.classList.remove("active"));
      document.getElementById("panel-" + btn.dataset.panel).classList.add("active");
    });
  });

  // Mini-fil d'actualités
  const news = await News.list({ limit: 3 });
  document.getElementById("member-news").innerHTML = news.length ? news.map(n => `
    <a href="actualites.html#${n.slug || n.id}" style="display:flex; justify-content:space-between; gap:16px; text-decoration:none; color:inherit; padding:10px 0; border-bottom:1px solid var(--border);">
      <span style="font-weight:600; font-size:.94rem;">${escapeHtml(n.titre)}</span>
      <span class="news-date" style="white-space:nowrap;">${formatDate(n.date)}</span>
    </a>`).join("") : `<p style="color:var(--ink-soft);">Aucune actualité pour le moment.</p>`;

  // Sauvegarde du profil
  document.getElementById("profile-form").addEventListener("submit", async e => {
    e.preventDefault();
    const res = await Auth.updateProfile({
      full_name: document.getElementById("p-nom").value.trim() || me.full_name,
      universite: selectFieldValue("p-univ"),
      faculte: selectFieldValue("p-fac"),
    });
    const box = document.getElementById("profile-alert");
    box.innerHTML = res.ok
      ? `<div class="alert alert-success" role="alert"><span>Profil mis à jour.</span></div>`
      : `<div class="alert alert-error" role="alert"><span>La mise à jour a échoué. Réessayez.</span></div>`;
  });
})();
</script>

</body>
</html>
