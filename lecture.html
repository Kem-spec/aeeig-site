<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lecture — AEEIG</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0E7A52">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AEEIG">
  <link rel="icon" href="assets/favicon-256.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Page de lecture : le document occupe tout l'écran */
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; overflow: hidden; }
    .reader-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--white);
      flex-shrink: 0;
    }
    .reader-bar .r-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .reader-bar img { height: 34px; width: auto; flex-shrink: 0; }
    .reader-bar h1 {
      font-size: 1rem;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .reader-main { flex: 1; min-height: 0; background: #3D4340; position: relative; }
    .reader-main iframe { width: 100%; height: 100%; border: none; display: block; }
    .reader-msg {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .reader-msg p { color: rgba(255,255,255,.75); max-width: 40em; }
    .reader-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      font-size: .82rem;
      color: var(--ink-soft);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    @media (max-width: 640px) {
      .reader-bar h1 { font-size: .9rem; }
      .reader-foot { font-size: .74rem; }
    }

    /* Lecture PDF : pages rendues en canvas, adaptées à la largeur de l'écran */
    .pdf-scroll {
      height: 100%;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 8px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .pdf-page {
      max-width: 100%;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 8px 30px rgba(0,0,0,.35);
      overflow: hidden;
      flex-shrink: 0;
    }
    .pdf-page canvas { display: block; user-select: none; -webkit-user-select: none; }

    /* Lecture Word : rendu dans la page, copie et sélection désactivées */
    .docx-scroll { height: 100%; overflow: auto; padding: 28px 16px; }
    .docx-page {
      position: relative;
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      padding: 56px 64px;
      font-size: 1.02rem;
      line-height: 1.75;
      user-select: none;
      -webkit-user-select: none;
      box-shadow: 0 10px 40px rgba(0,0,0,.35);
    }
    .docx-page img { max-width: 100%; height: auto; }
    .docx-page table { border-collapse: collapse; width: 100%; }
    .docx-page td, .docx-page th { border: 1px solid #ccc; padding: 6px 10px; }
    .docx-watermark {
      position: sticky;
      top: 40%;
      display: block;
      height: 0;
      text-align: center;
      font-family: var(--font-head);
      font-size: 2.6rem;
      font-weight: 800;
      color: rgba(14, 122, 82, .08);
      transform: rotate(-22deg);
      pointer-events: none;
      z-index: 1;
      white-space: nowrap;
    }
    @media (max-width: 640px) { .docx-page { padding: 28px 20px; } }

    /* Impression bloquée : la page imprimée sort vide */
    @media print {
      body { visibility: hidden !important; display: none !important; }
    }
  </style>
</head>
<body oncontextmenu="return false">

<div class="reader-bar">
  <div class="r-title">
    <img src="assets/logo-mark.png" alt="AEEIG">
    <h1 id="doc-title">Chargement…</h1>
  </div>
  <div style="display:flex; gap:10px; flex-shrink:0;">
    <a class="btn btn-outline btn-sm" href="bibliotheque.html" id="back-btn">← Bibliothèque</a>
    <button class="btn btn-green btn-sm" onclick="window.close()">✕ Fermer</button>
  </div>
</div>

<div class="reader-main" id="reader-main">
  <div class="reader-msg" id="reader-loading"><p>Chargement du document…</p></div>
</div>

<div class="reader-foot">
  <span id="reader-meta">Consultation réservée aux membres et abonnés</span>
  <span class="viewer-lock">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    Lien sécurisé temporaire
  </span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
// Blocage des raccourcis d'impression / enregistrement sur cette page
document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && ["p", "s"].includes(e.key.toLowerCase())) {
    e.preventDefault();
    toast("Impression et enregistrement désactivés — lecture en ligne uniquement.");
  }
});

(async () => {
  const main = document.getElementById("reader-main");
  const titleEl = document.getElementById("doc-title");
  const metaEl = document.getElementById("reader-meta");

  function showMsg(html) { main.innerHTML = `<div class="reader-msg">${html}</div>`; }

  // Charge un PDF : worker d'abord ; si blocage/erreur, repli sur le thread principal
  async function loadPdfDoc(url) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
    const withTimeout = (p, ms) => Promise.race([p, new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), ms))]);
    try {
      return await withTimeout(pdfjsLib.getDocument({ url }).promise, 15000);
    } catch (e) {
      return await pdfjsLib.getDocument({ url, disableWorker: true }).promise;
    }
  }

  const docId = new URLSearchParams(location.search).get("doc");
  if (!docId) { showMsg(`<h2 style="color:#fff;">Document introuvable</h2><a class="btn btn-primary" href="bibliotheque.html">Retour à la bibliothèque</a>`); return; }

  const me = await Auth.me();
  if (!me) {
    window.location.href = "connexion.html";
    return;
  }

  const { data: doc, error } = await SB.from("library_docs").select("*").eq("id", docId).maybeSingle();
  if (error || !doc) {
    titleEl.textContent = "Document introuvable";
    showMsg(`<h2 style="color:#fff;">Ce document n'existe pas ou ne vous est pas accessible.</h2><a class="btn btn-primary" href="bibliotheque.html">Retour à la bibliothèque</a>`);
    return;
  }

  titleEl.textContent = doc.titre;
  document.title = doc.titre + " — AEEIG";
  metaEl.textContent = `${doc.type || "Document"} · ${doc.auteur || "—"} · ${doc.filiere || ""} ${doc.annee || ""} — lecteur : ${me.full_name || me.email}`;

  if (!doc.file_path) {
    showMsg(`<h2 style="color:#fff;">Aucun fichier joint</h2><p>${escapeHtml(doc.resume || "Le fichier de ce document n'a pas encore été téléversé par l'administration.")}</p><a class="btn btn-primary" href="bibliotheque.html">Retour à la bibliothèque</a>`);
    return;
  }

  const watermark = escapeHtml(me.full_name || me.email);

  try {
    const url = await Storage.signedDocUrl(doc.file_path);
    const name = (doc.file_name || doc.file_path).toLowerCase();

    if (/\.pdf$/.test(name)) {
      // PDF : rendu page par page dans le site (PDF.js). Fonctionne sur tous
      // les appareils (y compris iPhone), s'adapte à la largeur de l'écran,
      // et n'expose aucune interface de téléchargement/impression.
      showMsg(`<p>Préparation du document…</p>`);
      const pdf = await loadPdfDoc(url);
      metaEl.textContent += ` · ${pdf.numPages} page${pdf.numPages > 1 ? "s" : ""}`;

      main.innerHTML = `<div class="pdf-scroll" id="pdf-scroll"></div>`;
      const scrollEl = document.getElementById("pdf-scroll");
      const pageW = Math.min(scrollEl.clientWidth - 16, 900);

      // Gabarits de pages (hauteur estimée d'après la 1re page),
      // rendus seulement à l'approche de l'écran (léger même à 100+ pages)
      const p1 = await pdf.getPage(1);
      const ratio = p1.getViewport({ scale: 1 }).height / p1.getViewport({ scale: 1 }).width;
      const holders = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const h = document.createElement("div");
        h.className = "pdf-page";
        h.dataset.page = i;
        h.style.width = pageW + "px";
        h.style.height = Math.round(pageW * ratio) + "px";
        scrollEl.appendChild(h);
        holders.push(h);
      }
      const io = new IntersectionObserver(entries => {
        entries.forEach(async en => {
          if (!en.isIntersecting) return;
          const el = en.target;
          io.unobserve(el);
          if (el.dataset.done) return;
          el.dataset.done = "1";
          const page = await pdf.getPage(+el.dataset.page);
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const scale = pageW / page.getViewport({ scale: 1 }).width;
          const vp = page.getViewport({ scale: scale * dpr });
          const canvas = document.createElement("canvas");
          canvas.width = vp.width;
          canvas.height = vp.height;
          canvas.style.width = "100%";
          canvas.style.height = "auto";
          await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
          el.style.height = "auto";
          el.appendChild(canvas);
        });
      }, { root: scrollEl, rootMargin: "800px" });
      holders.forEach(h => io.observe(h));
    } else if (/\.docx?$/.test(name)) {
      // Word : converti et affiché DANS la page (aucune interface externe,
      // donc aucun bouton de téléchargement)
      showMsg(`<p>Préparation du document…</p>`);
      const buf = await (await fetch(url)).arrayBuffer();
      const result = await mammoth.convertToHtml({ arrayBuffer: buf });
      main.innerHTML = `
        <div class="docx-scroll">
          <div class="docx-page" oncontextmenu="return false">
            <div class="docx-watermark" aria-hidden="true">AEEIG · ${watermark}</div>
            ${result.value}
          </div>
        </div>`;
    } else if (/\.(jpg|jpeg|png|gif|webp)$/.test(name)) {
      // Image : affichée directement
      main.innerHTML = `<div style="height:100%; overflow:auto; display:flex; align-items:flex-start; justify-content:center; padding:20px;">
        <img src="${url}" alt="${escapeHtml(doc.titre)}" style="max-width:100%; height:auto; border-radius:8px;" oncontextmenu="return false" draggable="false"></div>`;
    } else {
      // PowerPoint / Excel / autres : pas de visionneuse protégée fiable dans le
      // navigateur — on demande la conversion en PDF plutôt que d'exposer un
      // lecteur externe avec option de téléchargement.
      showMsg(`<h2 style="color:#fff;">Format à convertir</h2>
        <p>Pour garantir une lecture protégée (sans téléchargement), les fichiers
        <strong>PowerPoint et Excel</strong> doivent être convertis en <strong>PDF</strong>
        avant leur publication dans la bibliothèque. Signalez ce document à l'administration.</p>
        <a class="btn btn-primary" href="bibliotheque.html">Retour à la bibliothèque</a>`);
    }
  } catch (e) {
    showMsg(`<h2 style="color:#fff;">Impossible d'ouvrir ce document</h2><p>${escapeHtml(e.message || "Vérifiez que votre compte est bien membre ou abonné.")}</p><a class="btn btn-primary" href="bibliotheque.html">Retour à la bibliothèque</a>`);
  }
})();
</script>

</body>
</html>
